<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Welbodi na Gentri account to access personalized health information, track wellness goals, and get tailored health recommendations for Sierra Leone.">
    <meta name="keywords" content="register, create account, health tracking, wellness goals, personalized health">
    <meta name="author" content="Welbodi na Gentri">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Register - Welbodi na Gentri">
    <meta property="og:description" content="Create your account to access personalized health tracking and wellness resources.">
    <meta property="og:url" content="https://welbodi.sl/pages/register.html">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://welbodi.sl/pages/register.html">
    <title>Register - Welbodi na Gentri</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/forms.css">
</head>
<body class="auth-page">
    <!-- Skip to main content link -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main role="main" id="main-content">
        <div class="auth-card">
        <div class="auth-logo">
            <a class="brand" href="../index.html">
                <span class="brand-icon" aria-hidden="true">💚</span>
                <span class="brand-text">Welbodi na Gentri</span>
            </a>
        </div>

        <h1>Create Your Account</h1>
        <p>Join our community for personalized health guidance and resources.</p>

        <form id="register-form" class="auth-form" novalidate>
            <div>
                <label for="full-name">Full Name</label>
                <input id="full-name" name="full-name" type="text" required>
                <div class="field-error" id="full-name-error"></div>
            </div>

            <div>
                <label for="email">Email Address</label>
                <input id="email" name="email" type="email" required>
                <div class="field-error" id="email-error"></div>
            </div>

            <div>
                <label for="phone">Phone Number</label>
                <input id="phone" name="phone" type="tel">
                <div class="field-error" id="phone-error"></div>
            </div>

            <div>
                <label for="password">Password</label>
                <div class="password-field">
                    <input id="password" name="password" type="password" required>
                    <button type="button" class="password-toggle" data-target="password" aria-label="Toggle password visibility">👁️</button>
                </div>
                <div class="field-error" id="password-error"></div>
            </div>

            <div>
                <label for="confirm-password">Confirm Password</label>
                <div class="password-field">
                    <input id="confirm-password" name="confirm-password" type="password" required>
                    <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Toggle password visibility">👁️</button>
                </div>
                <div class="field-error" id="confirm-password-error"></div>
            </div>

            <div>
                <label for="district">District</label>
                <select id="district" name="district" required>
                    <option value="">Select your district</option>
                    <option value="western-area">Western Area</option>
                    <option value="bo">Bo</option>
                    <option value="kenema">Kenema</option>
                    <option value="makeni">Makeni</option>
                    <option value="kono">Kono</option>
                    <option value="bombali">Bombali</option>
                    <option value="kambia">Kambia</option>
                    <option value="karene">Karene</option>
                    <option value="koinadugu">Koinadugu</option>
                    <option value="port-loko">Port Loko</option>
                    <option value="tonkolili">Tonkolili</option>
                    <option value="falaba">Falaba</option>
                    <option value="kailahun">Kailahun</option>
                    <option value="kenema">Kenema</option>
                    <option value="kono">Kono</option>
                    <option value="bonthe">Bonthe</option>
                    <option value="moyamba">Moyamba</option>
                    <option value="pujehun">Pujehun</option>
                </select>
                <div class="field-error" id="district-error"></div>
            </div>

            <div class="checkbox-field">
                <input id="terms" name="terms" type="checkbox" required>
                <label for="terms">I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a></label>
                <div class="field-error" id="terms-error"></div>
            </div>

            <button type="submit" class="auth-submit" id="register-submit">Create Account</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    </main>

    <div id="toast" class="toast" role="alert"></div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
